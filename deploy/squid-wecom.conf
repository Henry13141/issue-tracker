# 企业微信 API 专用 Squid 转发（Ubuntu 24 / Squid 6）
#
# 部署：
#   sudo htpasswd -cbB /etc/squid/passwd wecomproxy '强密码'
#   sudo chown proxy:proxy /etc/squid/passwd && sudo chmod 640 /etc/squid/passwd
#   sudo cp deploy/squid-wecom.conf /etc/squid/squid.conf
#   sudo squid -k parse && sudo systemctl restart squid
#
# 腾讯云防火墙放行 TCP 3128。
#
# 注意：仅写「http_access allow authenticated wecom_api」在 HTTPS 下不够，
# 必须显式允许 CONNECT，否则 curl/Node 会在 CONNECT 阶段一直超时。

auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwd
auth_param basic realm proxy
auth_param basic credentialsttl 2 hours

acl authenticated proxy_auth REQUIRED
acl wecom_api dstdomain qyapi.weixin.qq.com
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access allow CONNECT authenticated wecom_api SSL_ports
http_access allow authenticated wecom_api
http_access deny all

http_port 3128

# 若上游解析异常可尝试：dns_v4_first on
