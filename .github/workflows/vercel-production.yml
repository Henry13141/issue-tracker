# 推送到 main 时自动部署到 Vercel Production。
# 需在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   VERCEL_TOKEN        — Vercel Account → Settings → Tokens
#   VERCEL_ORG_ID       — 本地执行 vercel link 后 .vercel/project.json 里的 orgId
#   VERCEL_PROJECT_ID   — 同上 project.json 里的 projectId
#
# 若已在 Vercel 控制台为该仓库开启 Git 集成，推送也会触发 Vercel 自带部署；
# 可同时存在（会各部署一次）或仅在 Vercel 里关闭 “Auto-deploy” 只保留本工作流。

name: Deploy Production (Vercel)

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
